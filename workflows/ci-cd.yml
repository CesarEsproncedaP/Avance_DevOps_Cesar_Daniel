name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Build imagen Docker
      run: docker build -t ci-cd-demo ./docker

    - name: Ejecutar contenedor
      run: docker run -d -p 8080:80 ci-cd-demo

    - name: Esperar a que el servicio inicie
      run: sleep 5

    - name: Validar despliegue
      run: curl http://localhost:8080
